<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新年抽签 - 2026新春大吉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #8B0000 0%, #DC143C 50%, #8B0000 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #333;
            overflow-x: hidden;
        }

        /* 装饰性灯笼 */
        .lantern-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
            z-index: 1;
        }

        .lantern {
            width: 60px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FF0000);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            animation: swing 3s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .lantern::before,
        .lantern::after {
            content: '';
            position: absolute;
            background: #FFD700;
        }

        .lantern::before {
            width: 10px;
            height: 8px;
            border-radius: 5px;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
        }

        .lantern::after {
            width: 14px;
            height: 25px;
            border-radius: 7px;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(to bottom, #FFD700, #FF4500);
        }

        .lantern.tassel {
            animation-delay: -1.5s;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* 主容器 */
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 248, 220, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-top: 40px;
            position: relative;
            z-index: 10;
            border: 4px solid #FFD700;
        }

        /* 标题 */
        h1 {
            text-align: center;
            color: #DC143C;
            font-size: 3em;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(255, 215, 0, 0.5);
            font-weight: bold;
            letter-spacing: 5px;
        }

        .subtitle {
            text-align: center;
            color: #8B0000;
            font-size: 1.2em;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* 输入区域 */
        .input-section {
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-label {
            font-size: 1.2em;
            color: #8B0000;
            min-width: 100px;
            font-weight: bold;
        }

        .input-field {
            flex: 1;
            padding: 15px;
            border: 2px solid #DC143C;
            border-radius: 10px;
            font-size: 1.1em;
            background: #FFFAF0;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* 按钮 */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.3em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #8B0000;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: linear-gradient(135deg, #DC143C, #8B0000);
            color: #FFD700;
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.4);
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 20, 60, 0.6);
        }

        .btn-reset:active {
            transform: translateY(0);
        }

        /* 覆盖层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 抽签结果 */
        .result-container {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            animation: scaleIn 0.5s ease-out;
            max-width: 500px;
            width: 90%;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .result-title {
            font-size: 2.5em;
            color: #8B0000;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .result-content {
            font-size: 2em;
            color: #DC143C;
            font-weight: bold;
            padding: 30px;
            background: #FFFAF0;
            border-radius: 15px;
            border: 3px solid #DC143C;
            margin-bottom: 30px;
            word-wrap: break-word;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 烟花画布 */
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* 装饰元素 */
        .decoration {
            position: absolute;
            font-size: 2em;
            opacity: 0.6;
        }

        .decoration-1 { top: 20px; left: 20px; }
        .decoration-2 { top: 20px; right: 20px; }
        .decoration-3 { bottom: 20px; left: 20px; }
        .decoration-4 { bottom: 20px; right: 20px; }

        /* 中国结装饰 */
        .knot-decoration {
            position: fixed;
            width: 120px;
            height: 120px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="%23DC143C" stroke="%23FFD700" stroke-width="3"/><path d="M50 10 L50 30 L70 50 L50 70 L30 50 Z" fill="%23FFD700"/><path d="M10 50 L30 50 L50 70 L70 50 L90 50" stroke="%23FFD700" stroke-width="3" fill="none"/></svg>') center/contain no-repeat;
            z-index: 5;
        }

        .knot-1 { top: 100px; left: 20px; }
        .knot-2 { top: 100px; right: 20px; }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin-top: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .input-group {
                flex-direction: column;
                align-items: stretch;
            }

            .input-label {
                min-width: auto;
            }

            .lantern {
                width: 40px;
                height: 50px;
            }

            .knot-decoration {
                width: 80px;
                height: 80px;
            }
        }

        /* 底部版权信息 */
        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            color: #FFD700;
            font-size: 0.9em;
            z-index: 10;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* 庆祝文字动画 */
        .celebration-text {
            font-size: 1.2em;
            color: #8B0000;
            margin-top: 20px;
            font-weight: bold;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <!-- 装饰灯笼 -->
    <div class="lantern-container">
        <div class="lantern"></div>
        <div class="lantern tassel"></div>
    </div>

    <!-- 中国结装饰 -->
    <div class="knot-decoration knot-1"></div>
    <div class="knot-decoration knot-2"></div>

    <!-- 烟花画布 -->
    <canvas id="fireworks"></canvas>

    <!-- 主容器 -->
    <div class="container">
        <h1>🧧 新春大吉 🧧</h1>
        <p class="subtitle">输入您的五个新年愿望，让我们来抽取您的幸运签！</p>

        <!-- 输入区域 -->
        <div class="input-section">
            <div class="input-group">
                <label class="input-label">愿望一</label>
                <input type="text" class="input-field" placeholder="输入第一个新年愿望..." id="option1">
            </div>
            <div class="input-group">
                <label class="input-label">愿望二</label>
                <input type="text" class="input-field" placeholder="输入第二个新年愿望..." id="option2">
            </div>
            <div class="input-group">
                <label class="input-label">愿望三</label>
                <input type="text" class="input-field" placeholder="输入第三个新年愿望..." id="option3">
            </div>
            <div class="input-group">
                <label class="input-label">愿望四</label>
                <input type="text" class="input-field" placeholder="输入第四个新年愿望..." id="option4">
            </div>
            <div class="input-group">
                <label class="input-label">愿望五</label>
                <input type="text" class="input-field" placeholder="输入第五个新年愿望..." id="option5">
            </div>
        </div>

        <!-- 按钮区域 -->
        <div class="button-container">
            <button class="btn btn-primary" onclick="startDraw()">✨ 开始抽签 ✨</button>
            <button class="btn btn-reset" onclick="resetDraw()">🔄 重新开始</button>
        </div>
    </div>

    <!-- 底部版权信息 -->
    <footer>
        <p>Copyright © 2026 PeaCocoa. 保留所有权利.</p>
    </footer>

    <!-- 结果覆盖层 -->
    <div class="overlay" id="overlay">
        <div class="result-container">
            <div class="result-title">🎊 恭喜您抽中 🎊</div>
            <div class="result-content" id="resultText"></div>
            <div class="celebration-text">祝您2026新年快乐！万事如意！</div>
            <button class="btn btn-primary" onclick="closeOverlay()">收下祝福</button>
        </div>
    </div>

    <script>
        // 烟花效果
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let fireworks = [];
        let particles = [];
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 烟花类
        class Firework {
            constructor(x, y, targetY) {
                this.x = x;
                this.y = y;
                this.targetY = targetY;
                this.speed = 8;
                this.angle = Math.random() * Math.PI * 2;
                this.hue = Math.random() * 360;
                this.brightness = Math.random() * 30 + 50;
            }

            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    this.explode();
                    return false;
                }
                return true;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, ${this.brightness}%)`;
                ctx.fill();
            }

            explode() {
                const particleCount = 100;
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle(this.x, this.y, this.hue));
                }
            }
        }

        // 粒子类
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                this.speed = Math.random() * 3 + 2;
                this.angle = Math.random() * Math.PI * 2;
                this.friction = 0.95;
                this.gravity = 0.1;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
                ctx.fill();
                ctx.restore();
            }
        }

        // 动画循环
        function animate() {
            animationId = requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            fireworks = fireworks.filter(firework => {
                firework.draw();
                return firework.update();
            });

            particles = particles.filter(particle => {
                particle.draw();
                return particle.update();
            });
        }

        // 启动烟花
        function startFireworks() {
            const interval = setInterval(() => {
                const x = Math.random() * canvas.width;
                const y = canvas.height;
                const targetY = Math.random() * canvas.height * 0.5;
                fireworks.push(new Firework(x, y, targetY));
            }, 500);

            setTimeout(() => {
                clearInterval(interval);
                setTimeout(() => {
                    cancelAnimationFrame(animationId);
                }, 3000);
            }, 5000);
        }

        // 抽签逻辑
        function startDraw() {
            const options = [];
            for (let i = 1; i <= 5; i++) {
                const value = document.getElementById(`option${i}`).value.trim();
                if (value) {
                    options.push(value);
                }
            }

            if (options.length < 2) {
                alert('请至少输入两个愿望才能开始抽签！');
                return;
            }

            const randomIndex = Math.floor(Math.random() * options.length);
            const selectedOption = options[randomIndex];

            // 显示结果
            document.getElementById('resultText').textContent = selectedOption;
            document.getElementById('overlay').style.display = 'flex';

            // 启动烟花动画
            startFireworks();
            animate();
        }

        // 重置功能
        function resetDraw() {
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`option${i}`).value = '';
            }
            document.getElementById('overlay').style.display = 'none';
        }

        // 关闭覆盖层
        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        // 初始化默认值
        document.getElementById('option1').value = '财源滚滚';
        document.getElementById('option2').value = '身体健康';
        document.getElementById('option3').value = '学业有成';
        document.getElementById('option4').value = '爱情美满';
        document.getElementById('option5').value = '万事如意';
    </script>
</body>
</html>
